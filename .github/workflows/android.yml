name: Android Build & Package APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon > build.log 2>&1
        continue-on-error: false

      - name: Commit build log on failure
        if: failure()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp build.log build_error.txt
          git add build_error.txt
          git commit -m "Build Failure Log [run: ${{ github.run_id }}]"
          git push origin main

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MikGPT-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
